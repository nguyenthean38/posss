version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: phonestore_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: phonestore_pos
      MYSQL_USER: phonestore
      MYSQL_PASSWORD: phonestore123
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/database.sql:/docker-entrypoint-initdb.d/init.sql
      - ./docker/mysql/conf.d:/etc/mysql/conf.d
    networks:
      - phonestore_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # PHP + Apache Backend
  backend:
    build: .
    container_name: phonestore_backend
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html/backend
      - ./frontend:/var/www/html/frontend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: phonestore_pos
      DB_USER: phonestore
      DB_PASSWORD: phonestore123
      # Trợ lý AI (OpenRouter) — https://openrouter.ai/keys
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemini-2.0-flash-001}
      OPENROUTER_APP_URL: ${OPENROUTER_APP_URL:-http://localhost:8080}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-PhoneStore POS}
      # SePay — compose đọc .env ở gốc project; container không mount .env trực tiếp
      SEPAY_MERCHANT_ID: ${SEPAY_MERCHANT_ID:-}
      SEPAY_SECRET_KEY: ${SEPAY_SECRET_KEY:-}
      SEPAY_ENV: ${SEPAY_ENV:-sandbox}
      SEPAY_SUCCESS_URL: ${SEPAY_SUCCESS_URL:-}
      SEPAY_ERROR_URL: ${SEPAY_ERROR_URL:-}
      SEPAY_CANCEL_URL: ${SEPAY_CANCEL_URL:-}
      # VietQR — TK ngân hàng nhận tiền
      SEPAY_BANK_CODE: ${SEPAY_BANK_CODE:-}
      SEPAY_ACCOUNT_NUMBER: ${SEPAY_ACCOUNT_NUMBER:-}
      SEPAY_ACCOUNT_NAME: ${SEPAY_ACCOUNT_NAME:-}
    networks:
      - phonestore_network

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phonestore_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root123
      UPLOAD_LIMIT: 50M
    depends_on:
      - db
    networks:
      - phonestore_network

volumes:
  db_data:
    driver: local

networks:
  phonestore_network:
    driver: bridge
