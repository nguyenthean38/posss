<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập hệ thống POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="d-flex align-items-center justify-content-center"
    style="height: 100vh; background-color: var(--primary-color);">

    <div class="card p-4 shadow-lg" style="width: 400px; border-radius: 15px;">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-primary">Smart POS</h3>
            <p class="text-muted">Đăng nhập hệ thống bán hàng</p>
        </div>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email / Mã nhân viên</label>
                <input type="email" id="email" class="form-control" value="staff@pos.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Mật khẩu</label>
                <input type="password" id="password" class="form-control" value="123" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Đăng nhập</button>
        </form>
    </div>

    <div class="modal fade" id="changePassModal" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-warning">
                    <h5 class="modal-title">⚠️ Yêu cầu đổi mật khẩu</h5>
                </div>
                <div class="modal-body">
                    <p>Đây là lần đăng nhập đầu tiên qua Link. Vui lòng đổi mật khẩu để tiếp tục.</p>
                    <input type="password" class="form-control mb-2" placeholder="Mật khẩu mới">
                    <input type="password" class="form-control" placeholder="Xác nhận mật khẩu">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" onclick="window.location.href='index.html'">Cập nhật &
                        Vào POS</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            try {
                const user = await API.login(email, pass);
                if (user.first_login) {
                    // Nếu là lần đầu -> Hiện modal
                    new bootstrap.Modal(document.getElementById('changePassModal')).show();
                } else {
                    // Nếu bình thường -> Chuyển trang
                    window.location.href = user.role === 'admin' ? 'admin.html' : 'index.html';
                }
            } catch (err) {
                alert(err.message);
            }
        });
    </script>
</body>

</html>
