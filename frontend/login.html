<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TDT Đăng Nhập</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="stylesheet" href="assets/css/login.css" />
</head>
<body class="ps-body ps-noise" data-theme="dark">
    <div class="ps-login-controls">
        <button class="ps-chip" id="btnLang" type="button">
            <i class="bi bi-globe"></i><span id="langLabel">VI</span>
        </button>

        <button class="ps-icon-btn" id="btnTheme" type="button">
            <i class="bi bi-moon-stars"></i>
        </button>
    </div>

    <div class="container-login">
        <div class="left-panel">
            <div class="logo-section">
                <div class="logo">
                    <div class="ps-brand__icon mb-3"><i class="bi bi-cart3"></i></div>
                </div>
            </div>
            <div class="title-section">
                <h1>PHONESTORE<br />POS<br /><span style="font-size: 0.52em; opacity: 0.85; display: block; margin-top: 8px; font-weight: 500; letter-spacing: 2px;" data-i18n="login.subtitle">SALES & INVENTORY</span></h1>
            </div>
            <div class="icon-circle">
                <i class="bi bi-shield-lock"></i>
            </div>
        </div>
        <div class="right-panel">
            <div class="welcome-section">
                <div class="login-logo" style="text-align: center; margin-bottom: 1.5rem;">
                    <img src="assets/images/branding/logo.svg" alt="PhoneStore POS" style="width: 60px; height: auto;" />
                </div>
                <h2 data-i18n="login.welcome">WELCOME BACK!</h2>
            </div>
            <div class="login-form">
                <form id="loginForm" autocomplete="off">
                    <div class="input-group">
                        <div class="input-container">
                            <i class="bi bi-person input-icon"></i>
                            <input type="text" id="username" data-i18n-placeholder="login.username" placeholder="Username" autocomplete="off" />
                        </div>
                    </div>

                    <div class="input-group">
                        <div class="input-container">
                            <i class="bi bi-lock input-icon"></i>
                            <input type="password" id="password" data-i18n-placeholder="login.password" placeholder="Password" autocomplete="new-password" />
                            <i class="bi bi-eye password-toggle"></i>
                        </div>
                    </div>
                    <button class="login-btn" data-i18n="login.btn">LOGIN</button>
                </form>
            </div>

            <div class="footer-text" data-i18n="login.footer">
                Login to manage your store's sales and inventory efficiently.
            </div>

            <div class="mascot">
                <div class="mascot-character">
                    <img class="mascot-robot" src="picture/2.png" alt="Mascot" />
                </div>
            </div>
        </div>
    </div>
    <div class="snackbar" role="status" aria-live="polite"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js?v=639095644633487831"></script>
    <script type="module" src="assets/js/login.js?v=639095644633487831"></script>
</body>
</html>
