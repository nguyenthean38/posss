<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PhoneStore POS — Điểm danh ca</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="assets/css/styles.css" />
</head>

<body class="ps-body ps-noise" data-theme="dark">
    <div class="ps-app">
        <aside class="ps-sidebar" id="sidebar">
            <div class="ps-sidebar__brand">
                <div class="ps-brand__icon"><img src="assets/images/branding/mark-white.svg" alt="PhoneStore" style="width: 32px; height: 32px;" /></div>
                <div class="ps-brand__text">
                    <div class="ps-brand__title">PhoneStore POS</div>
                </div>
            </div>

            <nav class="ps-nav">
                <a class="ps-nav__item" href="dashboard.html" data-tooltip="Dashboard">
                    <i class="bi bi-grid-fill"></i><span data-i18n="nav.dashboard">Dashboard</span>
                </a>
                <a class="ps-nav__item" href="pos.html" data-tooltip="Point of Sale">
                    <i class="bi bi-bag"></i><span data-i18n="nav.pos">Point of Sale</span>
                </a>
                <a class="ps-nav__item" href="products.html" data-tooltip="Products">
                    <i class="bi bi-box-seam"></i><span data-i18n="nav.products">Products</span>
                </a>
                <a class="ps-nav__item" href="categories.html" data-tooltip="Categories">
                    <i class="bi bi-tags"></i><span data-i18n="nav.categories">Categories</span>
                </a>
                <a class="ps-nav__item" href="employees.html" data-tooltip="Employees">
                    <i class="bi bi-people"></i><span data-i18n="nav.employees">Employees</span>
                </a>
                <a class="ps-nav__item" href="customers.html" data-tooltip="Customers">
                    <i class="bi bi-person"></i><span data-i18n="nav.customers">Customers</span>
                </a>
                <a class="ps-nav__item" href="reports.html" data-tooltip="Reports">
                    <i class="bi bi-bar-chart"></i><span data-i18n="nav.reports">Reports</span>
                </a>
                <a class="ps-nav__item active admin-only" href="shifts.html" data-tooltip="Shifts">
                    <i class="bi bi-clock-history"></i><span data-i18n="nav.shifts">Điểm danh</span>
                </a>
                <a class="ps-nav__item admin-only" href="activity.html" data-tooltip="Activity log">
                    <i class="bi bi-journal-text"></i><span data-i18n="nav.activity">Nhật ký</span>
                </a>
            </nav>

            <div class="ps-sidebar__footer">
                <a class="ps-nav__item" href="profile.html" data-tooltip="Profile">
                    <i class="bi bi-person-circle"></i><span data-i18n="nav.profile">Profile</span>
                </a>
                <a class="ps-nav__item" href="login.html" data-tooltip="Logout">
                    <i class="bi bi-box-arrow-right"></i><span data-i18n="nav.logout">Logout</span>
                </a>
                <button class="ps-collapse btn btn-sm" id="btnCollapse" type="button">
                    <i class="bi bi-chevron-left"></i><span data-i18n="nav.collapse">Collapse</span>
                </button>
            </div>
        </aside>

        <main class="ps-main">
            <header class="ps-topbar ps-topbar--fixed">
                <div class="ps-topbar__left">
                    <button class="ps-icon-btn d-lg-none" id="btnMobileMenu" type="button"><i class="bi bi-list"></i></button>
                    <div class="ps-topbar__title">
                        <i class="bi bi-clock-history me-2" style="color:var(--muted)"></i>
                        <span data-i18n="page.shifts">Điểm danh ca</span>
                    </div>
                </div>
                <div class="ps-topbar__right">
                    <button class="ps-chip" id="btnLang" type="button"><i class="bi bi-globe"></i><span id="langLabel">VI</span></button>
                    <button class="ps-icon-btn" id="btnTheme" type="button"><i class="bi bi-moon-stars"></i></button>
                    <a href="profile.html" class="ps-user-link">
                        <div class="ps-user">
                            <div class="ps-user__avatar">AD</div>
                            <div class="ps-user__meta">
                                <div class="ps-user__name">Administrator</div>
                                <div class="ps-user__role" data-i18n="role.admin">Administrator</div>
                            </div>
                        </div>
                    </a>
                </div>
            </header>

            <section class="ps-content">
                <div class="d-flex flex-wrap align-items-end gap-3 mb-3">
                    <div>
                        <label class="ps-label mb-1" for="dateInput" data-i18n="sh.date">Ngày</label>
                        <input type="date" id="dateInput" class="ps-input" style="width:180px; height: 42px;" />
                    </div>
                    <div>
                        <label class="ps-label mb-1" for="staffFilter" data-i18n="sh.staff">Nhân viên</label>
                        <select id="staffFilter" class="ps-input" style="min-width:220px; height: 42px;">
                            <option value="" data-i18n="sh.allStaff">Tất cả</option>
                        </select>
                    </div>
                    <button type="button" class="ps-btn-secondary" id="btnExport" style="height: 42px; padding: 0 16px;"><i class="bi bi-download"></i> <span data-i18n="sh.export">Xuất CSV</span></button>
                    <button type="button" class="ps-btn-primary" id="btnLoad" style="height: 42px; padding: 0 16px;"><i class="bi bi-arrow-repeat"></i> <span data-i18n="sh.load">Tải</span></button>
                </div>
                <div class="ps-card p-0 overflow-hidden">
                    <div class="table-responsive">
                        <table class="table ps-table mb-0 align-middle">
                            <thead>
                                <tr>
                                    <th data-i18n="sh.colStaff">Nhân viên</th>
                                    <th data-i18n="sh.colIn">Vào ca</th>
                                    <th data-i18n="sh.colOut">Ra ca</th>
                                    <th data-i18n="sh.colStatus">Trạng thái</th>
                                    <th style="width:90px"></th>
                                </tr>
                            </thead>
                            <tbody id="tbody"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>

        <div class="ps-overlay" id="overlay"></div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content ps-modal">
                <div class="ps-modal__head">
                    <div class="ps-modal__title" data-i18n="sh.editTitle">Sửa giờ</div>
                    <button class="ps-icon-btn" type="button" data-bs-dismiss="modal"><i class="bi bi-x-lg"></i></button>
                </div>
                <div class="ps-modal__body">
                    <input type="hidden" id="editId" />
                    <label class="ps-label">Vào ca</label>
                    <input type="datetime-local" id="editIn" class="ps-input mb-3" />
                    <label class="ps-label">Ra ca</label>
                    <input type="datetime-local" id="editOut" class="ps-input mb-3" />
                    <label class="ps-label">Lý do điều chỉnh</label>
                    <textarea id="editReason" class="ps-input" rows="2" placeholder="Lý do"></textarea>
                </div>
                <div class="ps-modal__footer d-flex gap-2">
                    <button type="button" class="ps-btn-secondary w-100" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="ps-btn-primary w-100" id="btnSaveEdit">Lưu</button>
                </div>
            </div>
        </div>
    </div><div class="ps-toast" id="toast" role="status" aria-live="polite" aria-atomic="true">
        <i class="bi bi-check2-circle" id="toastIcon"></i>
        <div id="toastText">OK</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="assets/js/shifts.js?v=2"></script>
</body>

</html>
