<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đổi mật khẩu lần đầu - PhoneStore POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="stylesheet" href="assets/css/login.css" />
</head>
<body class="ps-body ps-noise" data-theme="dark">
    <div class="container-login">
        <div class="left-panel">
            <div class="logo-section">
                <div class="logo">
                    <div class="ps-brand__icon mb-3"><i class="bi bi-cart3"></i></div>
                </div>
            </div>
            <div class="title-section">
                <h1>PHONESTORE<br />POS<br /><span style="font-size: 0.52em; opacity: 0.85; display: block; margin-top: 8px; font-weight: 500; letter-spacing: 2px;">ĐỔI MẬT KHẨU</span></h1>
            </div>
            <div class="icon-circle">
                <i class="bi bi-key"></i>
            </div>
        </div>
        <div class="right-panel">
            <div class="welcome-section">
                <h2>ĐẶT MẬT KHẨU MỚI</h2>
                <p style="font-size: 0.9em; opacity: 0.8; margin-top: 8px;">Vui lòng đặt mật khẩu mới để bảo mật tài khoản</p>
            </div>
            <div class="login-form">
                <form id="initPasswordForm">
                    <div class="input-group">
                        <div class="input-container">
                            <i class="bi bi-lock input-icon"></i>
                            <input type="password" id="newPassword" placeholder="Mật khẩu mới" />
                            <i class="bi bi-eye password-toggle" data-target="newPassword"></i>
                        </div>
                    </div>

                    <div class="input-group">
                        <div class="input-container">
                            <i class="bi bi-lock-fill input-icon"></i>
                            <input type="password" id="confirmPassword" placeholder="Xác nhận mật khẩu" />
                            <i class="bi bi-eye password-toggle" data-target="confirmPassword"></i>
                        </div>
                    </div>

                    <div class="alert alert-warning" style="font-size: 0.85em; padding: 12px; margin-top: 16px;">
                        <i class="bi bi-exclamation-triangle"></i> Mật khẩu phải có ít nhất 6 ký tự
                    </div>

                    <button class="login-btn" type="submit">ĐỔI MẬT KHẨU</button>
                </form>
            </div>

            <div class="footer-text">
                Sau khi đổi mật khẩu, bạn có thể đăng nhập vào hệ thống.
            </div>
        </div>
    </div>
    <div class="snackbar" role="status" aria-live="polite"></div>
    <script type="module">
        import { api } from './assets/js/api.js';

        function toast(msg) {
            const el = document.querySelector('.snackbar');
            if (!el) { alert(msg); return; }
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 2500);
        }

        // Password toggles
        document.querySelectorAll('.password-toggle').forEach(toggle => {
            toggle.onclick = function() {
                const targetId = this.dataset.target;
                const input = document.getElementById(targetId);
                const isPwd = input.type === 'password';
                input.type = isPwd ? 'text' : 'password';
                this.className = isPwd ? 'bi bi-eye-slash password-toggle' : 'bi bi-eye password-toggle';
            };
        });

        document.getElementById('initPasswordForm').onsubmit = async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!newPassword || !confirmPassword) {
                toast('Vui lòng nhập đầy đủ thông tin');
                return;
            }

            if (newPassword.length < 6) {
                toast('Mật khẩu phải có ít nhất 6 ký tự');
                return;
            }

            if (newPassword !== confirmPassword) {
                toast('Xác nhận mật khẩu không khớp');
                return;
            }

            const btn = document.querySelector('.login-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-arrow-repeat spin"></i>';

            try {
                await api.initPassword(newPassword, confirmPassword);
                toast('Đổi mật khẩu thành công! Chuyển sang trang chủ...');
                setTimeout(() => {
                    location.href = 'dashboard.html';
                }, 1000);
            } catch (error) {
                toast(error.message || 'Đổi mật khẩu thất bại');
                btn.disabled = false;
                btn.innerHTML = 'ĐỔI MẬT KHẨU';
            }
        };
    </script>
</body>
</html>
