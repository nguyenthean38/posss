<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đổi mật khẩu lần đầu - PhoneStore POS</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="stylesheet" href="assets/css/login.css" />
    <style>
        .welcome-section {
            margin-bottom: 24px !important; 
        }
        .login-btn {
            margin-top: 16px !important;
        }
        .alert-warning {
            background-color: color-mix(in srgb, var(--warning) 15%, transparent);
            border-color: color-mix(in srgb, var(--warning) 30%, transparent);
            color: var(--text);
            border-radius: 12px;
        }
    </style>
</head>
<body class="ps-body ps-noise" data-theme="dark">
    <div class="ps-login-controls">
        <button class="ps-chip" id="btnLang" type="button">
            <i class="bi bi-globe"></i><span id="langLabel">VI</span>
        </button>

        <button class="ps-icon-btn" id="btnTheme" type="button">
            <i class="bi bi-moon-stars"></i>
        </button>
    </div>

    <div class="container-login">
        <div class="left-panel">
            <div class="logo-section">
                <div class="logo">
                    <div class="ps-brand__icon mb-3"><i class="bi bi-cart3"></i></div>
                </div>
            </div>
            <div class="title-section">
                <h1>PHONESTORE<br />POS<br /><span style="font-size: 0.52em; opacity: 0.85; display: block; margin-top: 8px; font-weight: 500; letter-spacing: 2px;" data-i18n="login.subtitle">SALES & INVENTORY</span></h1>
            </div>
            <div class="icon-circle">
                <i class="bi bi-key"></i>
            </div>
        </div>
        <div class="right-panel">
            <div class="welcome-section">
                <h2 data-i18n="init.welcome">ĐẶT MẬT KHẨU MỚI</h2>
                <p data-i18n="init.desc" style="font-size: 0.9em; opacity: 0.8; margin-top: 8px;">Vui lòng đặt mật khẩu mới để bảo mật tài khoản</p>
            </div>
            <div class="login-form">
                <form id="loginForm" autocomplete="off">
                    <div class="input-group">
                        <div class="input-container">
                            <i class="bi bi-lock input-icon"></i>
                            <input type="password" id="newPassword" data-i18n-placeholder="init.new" placeholder="Mật khẩu mới" autocomplete="new-password" />
                            <i class="bi bi-eye password-toggle" data-target="newPassword"></i>
                        </div>
                    </div>

                    <div class="input-group">
                        <div class="input-container">
                            <i class="bi bi-lock-fill input-icon"></i>
                            <input type="password" id="confirmPassword" data-i18n-placeholder="init.confirm" placeholder="Xác nhận mật khẩu" autocomplete="new-password" />
                            <i class="bi bi-eye password-toggle" data-target="confirmPassword"></i>
                        </div>
                    </div>

                    <div class="alert alert-warning" style="font-size: 0.85em; padding: 12px; margin-top: 14px;">
                        <i class="bi bi-exclamation-triangle"></i> <span data-i18n="init.alert">Mật khẩu phải có ít nhất 6 ký tự</span>
                    </div>

                    <button class="login-btn" type="submit" data-i18n="init.btn">ĐỔI MẬT KHẨU</button>
                </form>
            </div>

            <div class="footer-text" data-i18n="init.footer">
                Sau khi đổi mật khẩu, bạn có thể đăng nhập vào hệ thống.
            </div>

            <div class="mascot">
                <div class="mascot-character">
                    <img class="mascot-robot" src="picture/2.png" alt="Mascot" />
                </div>
            </div>
        </div>
    </div>
    <div class="snackbar" role="status" aria-live="polite"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js?v=639095644633487831"></script>
    <script type="module">
        import { api } from './assets/js/api.js?v=3';

        // ===== CONSTANTS & STATE =====
        const KEY_THEME = "ps_theme";
        const KEY_LANG = "ps_lang";

        const i18n = {
            vi: {
                "login.subtitle": "QUẢN LÝ BÁN HÀNG & TỒN KHO",
                "init.welcome": "ĐẶT MẬT KHẨU MỚI",
                "init.desc": "Vui lòng đặt mật khẩu mới để bảo mật tài khoản",
                "init.new": "Mật khẩu mới",
                "init.confirm": "Xác nhận mật khẩu",
                "init.alert": "Mật khẩu phải có ít nhất 6 ký tự",
                "init.btn": "ĐỔI MẬT KHẨU",
                "init.footer": "Sau khi đổi mật khẩu, bạn có thể đăng nhập vào hệ thống.",
                "init.toast.empty": "Vui lòng nhập đầy đủ thông tin",
                "init.toast.short": "Mật khẩu phải có ít nhất 6 ký tự",
                "init.toast.mismatch": "Xác nhận mật khẩu không khớp",
                "init.toast.success": "Đổi mật khẩu thành công! Chuyển sang trang chủ..."
            },
            en: {
                "login.subtitle": "SALES & INVENTORY MANAGEMENT",
                "init.welcome": "SET NEW PASSWORD",
                "init.desc": "Please secure your account with a new password",
                "init.new": "New Password",
                "init.confirm": "Confirm Password",
                "init.alert": "Password must contain at least 6 characters",
                "init.btn": "CHANGE PASSWORD",
                "init.footer": "After changing your password, you can login.",
                "init.toast.empty": "Please provide all corresponding fields",
                "init.toast.short": "Password must be at least 6 characters long",
                "init.toast.mismatch": "Passwords do not match",
                "init.toast.success": "Password changed successfully! Redirecting..."
            }
        };

        const getLang = () => localStorage.getItem(KEY_LANG) || "vi";
        const t = (k) => i18n[getLang()]?.[k] || i18n.en[k] || k;

        function applyLang() {
            const lang = getLang();
            document.documentElement.lang = lang;
            const label = document.getElementById("langLabel");
            if (label) label.textContent = lang.toUpperCase();

            document.querySelectorAll("[data-i18n]").forEach(el => {
                el.textContent = t(el.getAttribute("data-i18n"));
            });
            document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
                el.placeholder = t(el.getAttribute("data-i18n-placeholder"));
            });
        }
        
        function applyTheme() {
            const theme = localStorage.getItem(KEY_THEME) || "dark";
            document.body.setAttribute("data-theme", theme);
            const icon = document.querySelector("#btnTheme i");
            if (icon) {
                icon.className = theme === "dark" ? "bi bi-moon-stars" : "bi bi-sun";
            }
        }
        applyTheme();
        applyLang();

        const btnTheme = document.getElementById("btnTheme");
        if (btnTheme) {
            btnTheme.onclick = () => {
                const next = (localStorage.getItem(KEY_THEME) || "dark") === "dark" ? "light" : "dark";
                localStorage.setItem(KEY_THEME, next);
                applyTheme();
            };
        }

        const btnLang = document.getElementById("btnLang");
        if (btnLang) {
            btnLang.onclick = () => {
                const next = (localStorage.getItem(KEY_LANG) || "vi") === "vi" ? "en" : "vi";
                localStorage.setItem(KEY_LANG, next);
                applyLang();
            };
        }

        // ===== FORM LOGIC =====
        function toast(msg) {
            const el = document.querySelector('.snackbar');
            if (!el) { alert(msg); return; }
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 2500);
        }

        // Password toggles (for multiple target inputs)
        document.querySelectorAll('.password-toggle').forEach(toggle => {
            toggle.onclick = function() {
                const targetId = this.dataset.target;
                const input = document.getElementById(targetId);
                const isPwd = input.type === 'password';
                input.type = isPwd ? 'text' : 'password';
                this.className = isPwd ? 'bi bi-eye-slash password-toggle' : 'bi bi-eye password-toggle';
            };
        });

        // Input focus effects
        document.querySelectorAll("input").forEach(inp => {
            inp.onfocus = (e) => {
                const wrap = e.target.closest(".input-container");
                if (wrap) {
                    wrap.style.borderColor = "var(--primary)";
                    wrap.style.boxShadow = "var(--focus)";
                }
            };
            inp.onblur = (e) => {
                const wrap = e.target.closest(".input-container");
                if (wrap) {
                    wrap.style.borderColor = "var(--border)";
                    wrap.style.boxShadow = "none";
                }
            };
        });

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!newPassword || !confirmPassword) {
                toast(t('init.toast.empty'));
                return;
            }

            if (newPassword.length < 6) {
                toast(t('init.toast.short'));
                return;
            }

            if (newPassword !== confirmPassword) {
                toast(t('init.toast.mismatch'));
                return;
            }

            const btn = document.querySelector('.login-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-arrow-repeat spin"></i>';

            try {
                await api.initPassword(newPassword, confirmPassword);
                toast(t('init.toast.success'));
                setTimeout(() => {
                    location.href = 'dashboard.html';
                }, 1000);
            } catch (error) {
                toast(error.message || 'Đổi mật khẩu thất bại');
                btn.disabled = false;
                btn.innerHTML = t('init.btn') || 'ĐỔI MẬT KHẨU';
            }
        };
    </script>
</body>
</html>
