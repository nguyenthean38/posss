<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PhoneStore POS — Profile</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="assets/css/styles.css" />
</head>

<body class="ps-body ps-noise" data-theme="dark">
    <div class="ps-app">
        <!-- SIDEBAR -->
        <aside class="ps-sidebar" id="sidebar">
            <div class="ps-sidebar__brand">
                <div class="ps-brand__icon"><img src="assets/images/branding/mark-white.svg" alt="PhoneStore" style="width: 32px; height: 32px;" /></div>
                <div class="ps-brand__text">
                    <div class="ps-brand__title">PhoneStore POS</div>
                </div>
            </div>

            <nav class="ps-nav">
                <a class="ps-nav__item" href="dashboard.html" data-tooltip="Dashboard"><i
                        class="bi bi-grid-fill"></i><span data-i18n="nav.dashboard">Dashboard</span></a>
                <a class="ps-nav__item" href="pos.html" data-tooltip="Point of Sale"><i class="bi bi-bag"></i><span
                        data-i18n="nav.pos">Point of
                        Sale</span></a>
                <a class="ps-nav__item" href="products.html" data-tooltip="Products"><i class="bi bi-box-seam"></i><span
                        data-i18n="nav.products">Products</span></a>
                <a class="ps-nav__item" href="categories.html" data-tooltip="Categories"><i class="bi bi-tags"></i><span
                        data-i18n="nav.categories">Categories</span></a>
                <a class="ps-nav__item" href="employees.html" data-tooltip="Employees"><i class="bi bi-people"></i><span
                        data-i18n="nav.employees">Employees</span></a>
                <a class="ps-nav__item" href="customers.html" data-tooltip="Customers"><i class="bi bi-person"></i><span
                        data-i18n="nav.customers">Customers</span></a>
                <a class="ps-nav__item" href="reports.html" data-tooltip="Reports"><i class="bi bi-bar-chart"></i><span
                        data-i18n="nav.reports">Reports</span></a>
            </nav>

            <div class="ps-sidebar__footer">
                <a class="ps-nav__item active" href="profile.html" data-tooltip="Profile"><i
                        class="bi bi-person-circle"></i><span data-i18n="nav.profile">Profile</span></a>
                <a class="ps-nav__item" href="login.html" data-tooltip="Logout"><i class="bi bi-box-arrow-right"></i><span
                        data-i18n="nav.logout">Logout</span></a>

                <button class="ps-collapse btn btn-sm" id="btnCollapse" type="button">
                    <i class="bi bi-chevron-left"></i><span data-i18n="nav.collapse">Collapse</span>
                </button>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="ps-main">
            <!-- TOPBAR -->
            <header class="ps-topbar ps-topbar--fixed">
                <div class="ps-topbar__left">
                    <button class="ps-icon-btn d-lg-none" id="btnMobileMenu" type="button"><i
                            class="bi bi-list"></i></button>
                    <div class="ps-topbar__title">
                        <i class="bi bi-person-circle me-2" style="color:var(--muted)"></i>
                        <span data-i18n="nav.profile">Profile</span>
                    </div>
                </div>

                <div class="ps-topbar__right">
                    <button class="ps-chip" id="btnLang" type="button">
                        <i class="bi bi-globe"></i><span id="langLabel">VI</span>
                    </button>

                    <button class="ps-icon-btn" id="btnTheme" type="button">
                        <i class="bi bi-moon-stars"></i>
                    </button>

                    <a href="profile.html" class="ps-user-link">
                        <div class="ps-user">
                            <div class="ps-user__avatar" id="topAvatar">AD</div>
                            <div class="ps-user__meta">
                                <div class="ps-user__name" id="topName">Administrator</div>
                                <div class="ps-user__role" id="topRole" data-i18n="role.admin">Administrator</div>
                            </div>
                        </div>
                    </a>
                </div>
            </header>

            <!-- CONTENT -->
            <section class="ps-content ps-profile">
                <!-- HERO CARD -->
                <div class="ps-card ps-profileHero">
                    <div class="ps-profileHero__avatar" id="heroAvatar">AD</div>
                    <div class="ps-profileHero__meta">
                        <div class="ps-profileHero__name" id="heroName">Administrator</div>
                        <div class="ps-profileHero__email" id="heroEmail">admin@phonestore.com</div>
                        <div class="ps-profileHero__chips">
                            <span class="ps-pill" id="heroRole" data-i18n="role.admin">Administrator</span>
                            <span class="ps-muted" id="heroJoined">Joined: 2023-11-01</span>
                        </div>
                    </div>
                </div>

                <!-- TABS -->
                <div class="ps-profileTabs">
                    <button class="ps-tab active" data-tab="info">
                        <i class="bi bi-person"></i>
                        <span data-i18n="tab.info">Personal Information</span>
                    </button>
                    <button class="ps-tab" data-tab="pwd">
                        <i class="bi bi-lock"></i>
                        <span data-i18n="tab.pwd">Change Password</span>
                    </button>
                </div>

                <!-- PANELS -->
                <div class="ps-card ps-profilePanel" id="panelInfo">
                    <div class="row g-3">
                        <div class="col-12 col-md-6">
                            <label class="ps-label" data-i18n="form.name">Employee Name</label>
                            <input class="ps-input" id="fName" />
                        </div>

                        <div class="col-12 col-md-6">
                            <label class="ps-label" data-i18n="form.email">Email</label>
                            <input class="ps-input" id="fEmail" disabled />
                        </div>

                        <div class="col-12 col-md-6">
                            <label class="ps-label" data-i18n="form.phone">Phone Number</label>
                            <input class="ps-input" id="fPhone" inputmode="numeric" />
                        </div>

                        <div class="col-12 col-md-6">
                            <label class="ps-label" data-i18n="form.address">Address</label>
                            <input class="ps-input" id="fAddress" />
                        </div>

                        <div class="col-12">
                            <button class="ps-btn-primary ps-btn-sm" id="btnSaveInfo" type="button">
                                <i class="bi bi-floppy"></i>
                                <span data-i18n="common.save">Save</span>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="ps-card ps-profilePanel" id="panelPwd" style="display:none;">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="ps-label" data-i18n="pwd.current">Current Password</label>
                            <div class="ps-inputWrap">
                                <input class="ps-input ps-input--withBtn" id="curPwd" type="password" />
                                <button class="ps-eye" type="button" data-eye="curPwd"><i
                                        class="bi bi-eye"></i></button>
                            </div>
                        </div>

                        <div class="col-12">
                            <label class="ps-label" data-i18n="pwd.new">New Password</label>
                            <div class="ps-inputWrap">
                                <input class="ps-input ps-input--withBtn" id="newPwd" type="password" />
                                <button class="ps-eye" type="button" data-eye="newPwd"><i
                                        class="bi bi-eye"></i></button>
                            </div>

                            <div class="ps-strength mt-2">
                                <div class="ps-strength__bar">
                                    <div class="ps-strength__fill" id="pwFill"></div>
                                </div>
                                <div class="ps-strength__text" id="pwText">—</div>
                            </div>
                        </div>

                        <div class="col-12">
                            <label class="ps-label" data-i18n="pwd.confirm">Confirm Password</label>
                            <div class="ps-inputWrap">
                                <input class="ps-input ps-input--withBtn" id="cfmPwd" type="password" />
                                <button class="ps-eye" type="button" data-eye="cfmPwd"><i
                                        class="bi bi-eye"></i></button>
                            </div>
                        </div>

                        <div class="col-12">
                            <button class="ps-btn-primary ps-btn-sm" id="btnChangePwd" type="button">
                                <i class="bi bi-lock"></i>
                                <span data-i18n="pwd.btn">Change Password</span>
                            </button>
                        </div>
                    </div>
                </div>

            </section>
        </main>

        <div class="ps-overlay" id="overlay"></div>
    </div>

    <!-- Toast -->
    <div class="ps-toast" id="toast" role="status" aria-live="polite" aria-atomic="true">
        <i class="bi bi-check2-circle"></i>
        <div id="toastText">OK</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js?v=639095644633487831"></script>
    <script type="module" src="assets/js/profile.js?v=639095644633487831"></script>
</body>

</html>
