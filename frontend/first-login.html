<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập lần đầu - PhoneStore POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="stylesheet" href="assets/css/login.css" />
    <style>
        .welcome-section {
            margin-bottom: 24px !important; 
        }
        .login-btn {
            margin-top: 16px !important;
        }
        .alert-info {
            background-color: color-mix(in srgb, var(--primary) 15%, transparent);
            border-color: color-mix(in srgb, var(--primary) 30%, transparent);
            color: var(--text);
            border-radius: 12px;
        }
        /* Fix Auto-fill highlight styling */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #1a1a24 inset !important;
            -webkit-text-fill-color: #ffffff !important;
            border-radius: 0;
            background-color: transparent !important;
            transition: background-color 5000s ease-in-out 0s;
        }
        [data-theme="light"] input:-webkit-autofill,
        [data-theme="light"] input:-webkit-autofill:hover, 
        [data-theme="light"] input:-webkit-autofill:focus, 
        [data-theme="light"] input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #f8f9fa inset !important;
            -webkit-text-fill-color: #333333 !important;
        }
    </style>
</head>
<body class="ps-body ps-noise" data-theme="dark">
    <div class="ps-login-controls">
        <button class="ps-chip" id="btnLang" type="button">
            <i class="bi bi-globe"></i><span id="langLabel">VI</span>
        </button>

        <button class="ps-icon-btn" id="btnTheme" type="button">
            <i class="bi bi-moon-stars"></i>
        </button>
    </div>

    <div class="container-login">
        <div class="left-panel">
            <div class="logo-section">
                <div class="logo">
                    <div class="ps-brand__icon mb-3"><i class="bi bi-cart3"></i></div>
                </div>
            </div>
            <div class="title-section">
                <h1>PHONESTORE<br />POS<br /><span style="font-size: 0.52em; opacity: 0.85; display: block; margin-top: 8px; font-weight: 500; letter-spacing: 2px;" data-i18n="login.subtitle">SALES & INVENTORY</span></h1>
            </div>
            <div class="icon-circle">
                <i class="bi bi-shield-check"></i>
            </div>
        </div>
        <div class="right-panel">
            <div class="welcome-section">
                <h2 data-i18n="first.welcome">KÍCH HOẠT TÀI KHOẢN</h2>
                <p data-i18n="first.desc" style="font-size: 0.9em; opacity: 0.8; margin-top: 8px;">Vui lòng điền thông tin để kích hoạt</p>
            </div>
            <div class="login-form">
                <form id="loginForm" autocomplete="off">
                    <div class="input-group">
                        <div class="input-container">
                            <i class="bi bi-envelope input-icon"></i>
                            <input type="email" id="email" name="email" data-i18n-placeholder="first.email" placeholder="Email" autocomplete="new-email" />
                        </div>
                    </div>

                    <div class="input-group">
                        <div class="input-container">
                            <i class="bi bi-lock input-icon"></i>
                            <input type="password" id="password" name="password" data-i18n-placeholder="first.password" placeholder="Mật khẩu tạm thời" autocomplete="new-password" />
                            <i class="bi bi-eye password-toggle"></i>
                        </div>
                    </div>

                    <div class="alert alert-info" style="font-size: 0.85em; padding: 12px; margin-top: 14px;">
                        <i class="bi bi-info-circle"></i> <span data-i18n="first.alert">Mật khẩu tạm thời là MSSV trưởng nhóm. Bạn sẽ phải đổi mật khẩu ngay sau đây.</span>
                    </div>

                    <button class="login-btn" type="submit" data-i18n="first.btn">XÁC NHẬN</button>
                </form>
            </div>

            <div class="footer-text" data-i18n="first.footer">
                Link này có hiệu lực trong 1 phút kể từ khi gửi.
            </div>

            <div class="mascot">
                <div class="mascot-character">
                    <img class="mascot-robot" src="picture/2.png" alt="Mascot" />
                </div>
            </div>
        </div>
    </div>
    <div class="snackbar" role="status" aria-live="polite"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js?v=639095644633487831"></script>
    <script type="module">
        import { api } from './assets/js/api.js?v=6';

        // ===== CONSTANTS & STATE =====
        const KEY_THEME = "ps_theme";
        const KEY_LANG = "ps_lang";

        const i18n = {
            vi: {
                "login.subtitle": "QUẢN LÝ BÁN HÀNG & TỒN KHO",
                "first.welcome": "KÍCH HOẠT TÀI KHOẢN",
                "first.desc": "Vui lòng điền thông tin để kích hoạt",
                "first.email": "Email",
                "first.password": "Mật khẩu tạm thời",
                "first.btn": "XÁC NHẬN",
                "first.alert": "Mật khẩu tạm thời là MSSV trưởng nhóm. Bạn sẽ phải đổi mật khẩu ngay sau đây.",
                "first.footer": "Link này có hiệu lực trong 1 phút kể từ khi gửi.",
                "first.invalid_link": "Link không hợp lệ hoặc đã hết hạn!"
            },
            en: {
                "login.subtitle": "SALES & INVENTORY MANAGEMENT",
                "first.welcome": "ACTIVATE ACCOUNT",
                "first.desc": "Please input your credentials to activate",
                "first.email": "Email",
                "first.password": "Temporary Password",
                "first.btn": "CONFIRM",
                "first.alert": "The temporary password is the student ID. You will change it immediately.",
                "first.footer": "This link is valid for 1 minute after being sent.",
                "first.invalid_link": "Invalid or expired activation link!"
            }
        };

        const getLang = () => localStorage.getItem(KEY_LANG) || "vi";
        const t = (k) => i18n[getLang()]?.[k] || i18n.en[k] || k;

        function applyLang() {
            const lang = getLang();
            document.documentElement.lang = lang;
            const label = document.getElementById("langLabel");
            if (label) label.textContent = lang.toUpperCase();

            document.querySelectorAll("[data-i18n]").forEach(el => {
                el.textContent = t(el.getAttribute("data-i18n"));
            });
            document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
                el.placeholder = t(el.getAttribute("data-i18n-placeholder"));
            });
        }
        
        function applyTheme() {
            const theme = localStorage.getItem(KEY_THEME) || "dark";
            document.body.setAttribute("data-theme", theme);
            const icon = document.querySelector("#btnTheme i");
            if (icon) {
                icon.className = theme === "dark" ? "bi bi-moon-stars" : "bi bi-sun";
            }
        }
        applyTheme();
        applyLang();

        const btnTheme = document.getElementById("btnTheme");
        if (btnTheme) {
            btnTheme.onclick = () => {
                const next = (localStorage.getItem(KEY_THEME) || "dark") === "dark" ? "light" : "dark";
                localStorage.setItem(KEY_THEME, next);
                applyTheme();
            };
        }

        const btnLang = document.getElementById("btnLang");
        if (btnLang) {
            btnLang.onclick = () => {
                const next = (localStorage.getItem(KEY_LANG) || "vi") === "vi" ? "en" : "vi";
                localStorage.setItem(KEY_LANG, next);
                applyLang();
            };
        }

        // ===== FORM LOGIC =====
        function toast(msg) {
            const el = document.querySelector('.snackbar');
            if (!el) { alert(msg); return; }
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 2500);
        }

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const emailFromUrl = urlParams.get('email');

        if (!token) {
            toast(t('first.invalid_link'));
            setTimeout(() => location.href = 'login.html', 2000);
        }

        // Tự động điền email từ URL & khóa field để tránh nhập sai
        if (emailFromUrl) {
            const emailInput = document.getElementById('email');
            emailInput.value = decodeURIComponent(emailFromUrl);
            emailInput.readOnly = true;
            emailInput.style.opacity = '0.7';
            emailInput.style.cursor = 'not-allowed';
        }

        // Password toggle
        document.querySelector('.password-toggle').onclick = function() {
            const input = document.getElementById('password');
            const isPwd = input.type === 'password';
            input.type = isPwd ? 'text' : 'password';
            this.className = isPwd ? 'bi bi-eye-slash password-toggle' : 'bi bi-eye password-toggle';
        };

        // Input focus effects
        document.querySelectorAll("input").forEach(inp => {
            inp.onfocus = (e) => {
                const wrap = e.target.closest(".input-container");
                if (wrap) {
                    wrap.style.borderColor = "var(--primary)";
                    wrap.style.boxShadow = "var(--focus)";
                }
            };
            inp.onblur = (e) => {
                const wrap = e.target.closest(".input-container");
                if (wrap) {
                    wrap.style.borderColor = "var(--border)";
                    wrap.style.boxShadow = "none";
                }
            };
        });

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const emailInput = document.getElementById('email').value.trim();
            const passwordInput = document.getElementById('password').value.trim();

            if (!emailInput || !passwordInput) {
                toast('Vui lòng nhập đầy đủ thông tin');
                return;
            }

            const btn = document.querySelector('.login-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-arrow-repeat spin"></i>';

            try {
                const result = await api.firstLogin(emailInput, passwordInput, token);
                toast('Xác nhận thành công! Chuyển sang đổi mật khẩu...');
                setTimeout(() => {
                    location.href = 'init-password.html';
                }, 1000);
            } catch (error) {
                toast(error.message || 'Đăng nhập thất bại');
                btn.disabled = false;
                btn.innerHTML = t('first.btn') || 'XÁC NHẬN';
            }
        };
    </script>
</body>
</html>
