<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="d-flex" id="wrapper">
        <div class="bg-dark text-white p-3" style="width: 250px; min-height: 100vh;">
            <h4 class="mb-4 text-center text-primary fw-bold">POS Admin</h4>
            <div class="list-group list-group-flush">
                <a href="#" class="list-group-item list-group-item-action list-group-item-dark active"><i
                        class="fas fa-tachometer-alt me-2"></i>Tổng quan</a>
                <a href="#" class="list-group-item list-group-item-action list-group-item-dark"><i
                        class="fas fa-box me-2"></i>Sản phẩm</a>
                <a href="#" class="list-group-item list-group-item-action list-group-item-dark"><i
                        class="fas fa-users me-2"></i>Nhân viên</a>
                <a href="#" class="list-group-item list-group-item-action list-group-item-dark"><i
                        class="fas fa-chart-line me-2"></i>Báo cáo</a>
                <a href="login.html"
                    class="list-group-item list-group-item-action list-group-item-dark mt-5 text-danger"><i
                        class="fas fa-sign-out-alt me-2"></i>Đăng xuất</a>
            </div>
        </div>

        <div class="container-fluid p-4 bg-light w-100">
            <h2 class="mb-4">Tổng quan hôm nay</h2>

            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="card text-white bg-primary h-100">
                        <div class="card-body">
                            <h5 class="card-title">Doanh thu</h5>
                            <h3 class="fw-bold">15,200,000 ₫</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-white bg-success h-100">
                        <div class="card-body">
                            <h5 class="card-title">Đơn hàng</h5>
                            <h3 class="fw-bold">24</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-white bg-warning h-100">
                        <div class="card-body">
                            <h5 class="card-title">Sản phẩm bán</h5>
                            <h3 class="fw-bold">56</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-white bg-danger h-100">
                        <div class="card-body">
                            <h5 class="card-title">Lợi nhuận</h5>
                            <h3 class="fw-bold">3,500,000 ₫</h3>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-3">
                <div class="col-md-8">
                    <div class="card shadow-sm">
                        <div class="card-header bg-white fw-bold">Biểu đồ doanh thu 7 ngày</div>
                        <div class="card-body">
                            <canvas id="revenueChart" height="100"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card shadow-sm h-100">
                        <div class="card-header bg-white fw-bold">Sản phẩm bán chạy</div>
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item d-flex justify-content-between">
                                <span>iPhone 15</span> <span class="badge bg-primary">12</span>
                            </li>
                            <li class="list-group-item d-flex justify-content-between">
                                <span>Sạc 20W</span> <span class="badge bg-primary">8</span>
                            </li>
                            <li class="list-group-item d-flex justify-content-between">
                                <span>Redmi Note 13</span> <span class="badge bg-primary">5</span>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        // Vẽ biểu đồ Chart.js
        const ctx = document.getElementById('revenueChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['T2', 'T3', 'T4', 'T5', 'T6', 'T7', 'CN'],
                datasets: [{
                    label: 'Doanh thu (Triệu VNĐ)',
                    data: [12, 19, 3, 5, 2, 3, 15],
                    borderColor: '#0d6efd',
                    tension: 0.3,
                    fill: true,
                    backgroundColor: 'rgba(13, 110, 253, 0.1)'
                }]
            }
        });
    </script>
</body>

</html>
