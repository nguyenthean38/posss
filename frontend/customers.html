<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PhoneStore POS — Customers</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="assets/css/styles.css" />
</head>

<body class="ps-body ps-noise" data-theme="dark">
    <div class="ps-app">
        <!-- SIDEBAR -->
        <aside class="ps-sidebar" id="sidebar">
            <div class="ps-sidebar__brand">
                <div class="ps-brand__icon"><img src="assets/images/branding/mark-white.svg" alt="PhoneStore" style="width: 32px; height: 32px;" /></div>
                <div class="ps-brand__text">
                    <div class="ps-brand__title">PhoneStore POS</div>
                </div>
            </div>

            <nav class="ps-nav">
                <a class="ps-nav__item" href="dashboard.html" data-tooltip="Dashboard">
                    <i class="bi bi-grid-fill"></i><span data-i18n="nav.dashboard">Dashboard</span>
                </a>
                <a class="ps-nav__item" href="pos.html" data-tooltip="Point of Sale">
                    <i class="bi bi-bag"></i><span data-i18n="nav.pos">Point of Sale</span>
                </a>
                <a class="ps-nav__item" href="products.html" data-tooltip="Products">
                    <i class="bi bi-box-seam"></i><span data-i18n="nav.products">Products</span>
                </a>
                <a class="ps-nav__item" href="categories.html" data-tooltip="Categories">
                    <i class="bi bi-tags"></i><span data-i18n="nav.categories">Categories</span>
                </a>
                <a class="ps-nav__item" href="employees.html" data-tooltip="Employees">
                    <i class="bi bi-people"></i><span data-i18n="nav.employees">Employees</span>
                </a>

                <a class="ps-nav__item active" href="customers.html" data-tooltip="Customers">
                    <i class="bi bi-person"></i><span data-i18n="nav.customers">Customers</span>
                </a>

                <a class="ps-nav__item" href="reports.html" data-tooltip="Reports">
                    <i class="bi bi-bar-chart"></i><span data-i18n="nav.reports">Reports</span>
                </a>
            </nav>

            <div class="ps-sidebar__footer">
                <a class="ps-nav__item" href="profile.html" data-tooltip="Profile">
                    <i class="bi bi-person-circle"></i><span data-i18n="nav.profile">Profile</span>
                </a>
                <a class="ps-nav__item" href="login.html" data-tooltip="Logout">
                    <i class="bi bi-box-arrow-right"></i><span data-i18n="nav.logout">Logout</span>
                </a>

                <button class="ps-collapse btn btn-sm" id="btnCollapse" type="button">
                    <i class="bi bi-chevron-left"></i><span data-i18n="nav.collapse">Collapse</span>
                </button>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="ps-main">
            <!-- TOPBAR -->
            <header class="ps-topbar ps-topbar--fixed">
                <div class="ps-topbar__left">
                    <button class="ps-icon-btn d-lg-none" id="btnMobileMenu" type="button"><i
                            class="bi bi-list"></i></button>
                    <div class="ps-topbar__title">
                        <i class="bi bi-person me-2" style="color:var(--muted)"></i>
                        <span data-i18n="page.customers">Customers</span>
                        <span class="ps-count" id="cusCount">(0)</span>
                    </div>
                </div>

                <div class="ps-topbar__right">
                    <button class="ps-chip" id="btnLang" type="button"><i class="bi bi-globe"></i><span
                            id="langLabel">VI</span></button>
                    <button class="ps-icon-btn" id="btnTheme" type="button"><i class="bi bi-moon-stars"></i></button>

                    <a href="profile.html" class="ps-user-link">
                        <div class="ps-user">
                            <div class="ps-user__avatar">AD</div>
                            <div class="ps-user__meta">
                                <div class="ps-user__name">Administrator</div>
                                <div class="ps-user__role" data-i18n="role.admin">Administrator</div>
                            </div>
                        </div>
                    </a>
                </div>
            </header>

            <!-- CONTENT -->
            <section class="ps-content ps-customers">
                <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
                    <div class="ps-pos__search ps-card flex-grow-1">
                        <i class="bi bi-search"></i>
                        <input id="searchInput" type="text" class="ps-pos__searchInput" placeholder="Tìm kiếm..."
                            data-i18n-ph="cus.searchPh" />
                    </div>

                    <select class="ps-input ps-sort" id="sortSelect" style="width: 220px;">
                        <option value="rev_desc" data-i18n="cus.sortRevDesc">Doanh thu ↓</option>
                        <option value="rev_asc" data-i18n="cus.sortRevAsc">Doanh thu ↑</option>
                        <option value="ord_desc" data-i18n="cus.sortOrdDesc">Đơn hàng ↓</option>
                        <option value="ord_asc" data-i18n="cus.sortOrdAsc">Đơn hàng ↑</option>
                        <option value="name_asc" data-i18n="cus.sortNameAsc">Tên A→Z</option>
                    </select>

                    <!-- Khách hàng chỉ được tạo qua POS checkout, không cho tạo thủ công -->
                </div>

                <div class="row g-3" id="grid"></div>
            </section>
        </main>

        <div class="ps-overlay" id="overlay"></div>
    </div>

    <!-- ADD/EDIT MODAL -->
    <div class="modal fade" id="cusModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content ps-modal">
                <div class="ps-modal__head">
                    <div class="ps-modal__title" id="cusModalTitle" data-i18n="cus.modalAdd">Add customer</div>
                    <button class="ps-icon-btn" type="button" data-bs-dismiss="modal"><i
                            class="bi bi-x-lg"></i></button>
                </div>

                <div class="ps-modal__body">
                    <input type="hidden" id="cusId" />

                    <label class="ps-label" data-i18n="cus.fName">Name</label>
                    <input class="ps-input" id="fName" placeholder="Nguyễn Văn A" />

                    <label class="ps-label mt-3" data-i18n="cus.fPhone">Phone</label>
                    <input class="ps-input" id="fPhone" placeholder="0901234567" />

                    <label class="ps-label mt-3" data-i18n="cus.fAddress">Address</label>
                    <input class="ps-input" id="fAddress" placeholder="123 Nguyễn Huệ, Q1, HCM" />

                    <!-- Avatar Upload (Optional) -->
                    <div class="mt-3">
                        <label class="ps-label">Ảnh đại diện <span style="color: var(--muted); font-size: 0.875rem;">(Tùy chọn)</span></label>
                        <input class="ps-input" type="file" id="fAvatar" accept="image/*" />
                        <small class="text-muted d-block mt-1">JPG, PNG, GIF, WEBP - Tối đa 2MB. Nếu không chọn, sẽ dùng ảnh mặc định.</small>
                        <div id="avatarPreview" class="mt-2" style="display: none;">
                            <img id="previewAvatar" src="" alt="Preview" style="max-width: 120px; max-height: 120px; border-radius: 50%; object-fit: cover;" />
                        </div>
                    </div>
                </div>

                <div class="ps-modal__footer d-flex gap-2">
                    <button class="ps-btn-secondary w-100" type="button" data-bs-dismiss="modal">
                        <span data-i18n="common.cancel">Cancel</span>
                    </button>
                    <button class="ps-btn-primary w-100" id="btnSave" type="button">
                        <span data-i18n="common.save">Save</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- HISTORY MODAL -->
    <div class="modal fade" id="histModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content ps-modal ps-history">
                <div class="ps-modal__head">
                    <div class="ps-modal__title">
                        <i class="bi bi-clipboard-check me-2" style="color:var(--muted)"></i>
                        <span data-i18n="hist.title">Purchase history</span>
                    </div>
                    <button class="ps-icon-btn" type="button" data-bs-dismiss="modal"><i
                            class="bi bi-x-lg"></i></button>
                </div>

                <div class="ps-modal__body" id="histBody"></div>
            </div>
        </div>
    </div>

    <!-- DELETE MODAL -->
    <div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content ps-modal ps-confirm">
                <div class="ps-modal__head">
                    <div class="ps-modal__title" data-i18n="cus.modalDelete">Delete customer</div>
                    <button class="ps-icon-btn" type="button" data-bs-dismiss="modal"><i
                            class="bi bi-x-lg"></i></button>
                </div>
                <div class="ps-modal__body">
                    <div class="ps-confirm__text" id="deleteText"></div>
                </div>
                <div class="ps-modal__footer d-flex gap-2">
                    <button class="ps-btn-secondary w-100" type="button" data-bs-dismiss="modal">
                        <span data-i18n="common.cancel">Cancel</span>
                    </button>
                    <button class="ps-btn-danger w-100" id="btnConfirmDelete" type="button">
                        <i class="bi bi-trash3"></i><span data-i18n="common.delete">Delete</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="ps-toast" id="toast" role="status" aria-live="polite" aria-atomic="true">
        <i class="bi bi-check2-circle"></i>
        <div id="toastText">OK</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js?v=639095644633487831"></script>
    <script type="module" src="assets/js/customers.js?v=639095644633487831"></script>
</body>

</html>
