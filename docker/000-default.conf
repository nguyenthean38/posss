<VirtualHost *:80>
    DocumentRoot /var/www/html

    # De PHP getenv() nhan bien tu Docker
    PassEnv DB_HOST DB_NAME DB_USER DB_PASSWORD DB_PORT

    # Route /api/* -> index.php kem path
    RewriteEngine On
    RewriteRule ^/api(/.*)?$ /backend/index.php/api$1 [QSA,L]

    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/html/backend>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        AcceptPathInfo On
    </Directory>

    <Directory /var/www/html/frontend>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
