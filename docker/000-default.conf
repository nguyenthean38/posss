<VirtualHost *:80>
    DocumentRoot /var/www/html

    # De PHP getenv() nhan bien tu Docker
    PassEnv DB_HOST DB_NAME DB_USER DB_PASSWORD DB_PORT DB_SSL
    PassEnv SMTP_HOST SMTP_PORT SMTP_USER SMTP_PASSWORD SMTP_FROM_EMAIL SMTP_FROM_NAME
    PassEnv APP_BASE_URL OPENROUTER_API_KEY OPENROUTER_MODEL
    PassEnv SEPAY_MERCHANT_ID SEPAY_SECRET_KEY SEPAY_ENV SEPAY_SUCCESS_URL SEPAY_ERROR_URL SEPAY_CANCEL_URL
    PassEnv SEPAY_BANK_CODE SEPAY_ACCOUNT_NUMBER SEPAY_ACCOUNT_NAME SEPAY_TRANSFER_PREFIX

    # Redirect root -> login
    RewriteEngine On
    RewriteRule ^/$ /frontend/login.html [R=302,L]

    # Route /api/* -> index.php
    RewriteRule ^/api(/.*)?$ /backend/index.php/api$1 [QSA,L]

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/html/backend>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        AcceptPathInfo On
    </Directory>

    <Directory /var/www/html/frontend>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
