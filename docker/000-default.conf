<VirtualHost *:80>
    DocumentRoot /var/www/html

    # Để PHP getenv() nhận biến từ Docker (tránh rơi về localhost → lỗi 2002)
    PassEnv DB_HOST DB_NAME DB_USER DB_PASSWORD DB_PORT

    # Route tất cả /api/* requests đến backend/index.php
    RewriteEngine On
    RewriteRule ^/api(/.*)?$ /backend/index.php [QSA,L]

    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/html/backend>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/html/frontend>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
